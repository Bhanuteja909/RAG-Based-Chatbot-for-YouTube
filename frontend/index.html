<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Ask Assistant</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 30px;
  width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h2 {
  font-size: 20px;
  margin-bottom: 4px;
}

.header p {
  font-size: 13px;
  color: #777;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 11px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: all 0.2s;
}

input:focus, textarea:focus {
  border: 1px solid #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  outline: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
}

button:disabled {
  background: #aaa;
  cursor: not-allowed;
}

/* Output */
#output-wrap {
  margin-top: 15px;
  display: none;
}

#output {
  background: #f1f5f9;
  padding: 12px;
  border-radius: 10px;
  min-height: 50px;
  line-height: 1.5;
}

/* Loader dots */
.loader {
  display: inline-block;
}

.loader span {
  display: inline-block;
  width: 6px;
  height: 6px;
  margin: 0 2px;
  background: #6366f1;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%,80%,100% { opacity: 0.3; transform: scale(0.6); }
  40% { opacity: 1; transform: scale(1); }
}
</style>

</head>
<body>

<div class="card">

  <div class="header">
    <h2>🎥 YT Ask Assistant</h2>
    <p>Ask anything about a YouTube video</p>
  </div>

  <input id="ytLink" placeholder="Paste YouTube link here...">
  <textarea id="question" placeholder="Ask your question..."></textarea>

  <button id="btn" onclick="handleAsk()">Ask</button>

  <div id="output-wrap">
    <h4 style="margin-bottom:6px;">Answer</h4>
    <div id="output"></div>
  </div>

</div>

<script>
async function handleAsk() {
  const ytLink = document.getElementById("ytLink").value.trim();
  const question = document.getElementById("question").value.trim();
  const output = document.getElementById("output");
  const wrap = document.getElementById("output-wrap");
  const btn = document.getElementById("btn");

  if (!ytLink || !question) {
    output.innerText = "⚠️ Please fill all fields";
    wrap.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Thinking...";
  wrap.style.display = "block";

  output.innerHTML = `
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
  `;

  try {
    const res = await fetch("http://127.0.0.1:8000/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ytLink: ytLink,
        question: question
      })
    });

    const data = await res.json();
    output.innerText = data.answer;

  } catch (err) {
    output.innerText = "❌ Backend not running!";
  }

  btn.disabled = false;
  btn.textContent = "Ask";
}
</script>

</body>
</html>
